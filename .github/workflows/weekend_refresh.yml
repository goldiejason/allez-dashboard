name: Weekend Data Refresh

on:
  schedule:
    # Saturday and Sunday at 18:00 UTC (7pm BST / 6pm GMT)
    # GitHub Actions runs in UTC — BST (Mar–Oct) is UTC+1, GMT (Oct–Mar) is UTC+0
    - cron: '0 18 * * 6,0'
  workflow_dispatch:
    # Also allows manual trigger from GitHub Actions tab

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run full data refresh (FTL + UK Ratings)
        env:
          SUPABASE_URL:              ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY:         ${{ secrets.SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          FTL_USERNAME:              ${{ secrets.FTL_USERNAME }}
          FTL_PASSWORD:              ${{ secrets.FTL_PASSWORD }}
          UK_RATINGS_USERNAME:       ${{ secrets.UK_RATINGS_USERNAME }}
          UK_RATINGS_PASSWORD:       ${{ secrets.UK_RATINGS_PASSWORD }}
        run: python scripts/run_weekly_refresh.py

      # UK Ratings collection (event history, DE bouts, annual stats) is handled
      # inside run_weekly_refresh.py for each athlete with uk_ratings_id set.
      # UK_RATINGS_USERNAME and UK_RATINGS_PASSWORD must be in GitHub Secrets.
