name: Weekend Data Refresh

on:
  schedule:
    # Saturday and Sunday — target 7pm BST (6pm GMT).
    # GitHub Actions scheduled runs can be delayed by up to 2 hours under
    # high load; scheduling at 16:00 UTC ensures the run fires by 18:00 UTC
    # (7pm BST / 6pm GMT) even in the worst case.
    # BST = UTC+1 (late Mar–Oct), GMT = UTC+0 (Oct–late Mar).
    - cron: '0 16 * * 6,0'
  workflow_dispatch:
    inputs:
      backfill_ftl:
        description: 'Run FTL event ID backfill for all unmatched DB tournaments (slow — ~10 min extra)'
        required: false
        default: 'false'
        type: choice
        options: ['false', 'true']

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run full data refresh (FTL + UK Ratings)
        env:
          SUPABASE_URL:              ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY:         ${{ secrets.SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          FTL_USERNAME:              ${{ secrets.FTL_USERNAME }}
          FTL_PASSWORD:              ${{ secrets.FTL_PASSWORD }}
          UK_RATINGS_USERNAME:       ${{ secrets.UK_RATINGS_USERNAME }}
          UK_RATINGS_PASSWORD:       ${{ secrets.UK_RATINGS_PASSWORD }}
        run: python scripts/run_weekly_refresh.py

      # UK Ratings collection (event history, DE bouts, annual stats) is handled
      # inside run_weekly_refresh.py for each athlete with uk_ratings_id set.
      # UK_RATINGS_USERNAME and UK_RATINGS_PASSWORD must be in GitHub Secrets.

      - name: Backfill FTL event IDs (manual trigger only)
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.backfill_ftl == 'true'
        env:
          SUPABASE_URL:              ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY:         ${{ secrets.SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          FTL_USERNAME:              ${{ secrets.FTL_USERNAME }}
          FTL_PASSWORD:              ${{ secrets.FTL_PASSWORD }}
        run: python scripts/discover_ftl_events.py --apply --apply-partial
