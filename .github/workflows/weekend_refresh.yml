name: Weekend Data Refresh

on:
  schedule:
    # Every Saturday at 23:00 UTC (midnight UK time in summer, 11pm in winter)
    - cron: '0 23 * * 6'
  workflow_dispatch:
    # Also allows manual trigger from GitHub Actions tab

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run FTL data collection
        env:
          SUPABASE_URL:              ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY:         ${{ secrets.SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          FTL_USERNAME:              ${{ secrets.FTL_USERNAME }}
          FTL_PASSWORD:              ${{ secrets.FTL_PASSWORD }}
        run: python scripts/run_weekly_refresh.py

      - name: Run UK Ratings annual stats collection
        env:
          SUPABASE_URL:              ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY:         ${{ secrets.SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          UK_RATINGS_USERNAME:       ${{ secrets.UK_RATINGS_USERNAME }}
          UK_RATINGS_PASSWORD:       ${{ secrets.UK_RATINGS_PASSWORD }}
        run: python -c "from collectors.ukratings_collector import collect_all_athletes; collect_all_athletes()"
